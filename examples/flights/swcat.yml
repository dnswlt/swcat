# Example configuration file.
ui:
  # A custom link pointing e.g. to custom instructions for your catalog.
  helpLinks:
    - title: Help
      url: https://dnswlt.github.io/swcat/
    - title: GitHub
      url: https://github.com/dnswlt/swcat
  # Define custom sections in entity detail pages based on annotations.
  # Each section renders an annotation either as raw JSON (when no template
  # is given) or via a Go html/template (using semantic HTML; styled by the
  # .custom-content CSS class).
  annotationBasedContent:
    # Show solace topics, annotated as a JSON list in the solace.com/topics
    # annotation, as a card on the API detail page.
    solace.com/topics:
      heading: Solace Topics
      open: true  # Whether the card should be open by default.
      template: |
        <ol>
          {{ range . }}<li>{{ . }}</li>{{ end }}
        </ol>
    # No template: rendered as pretty-printed JSON in the read-only viewer.
    swcat/custom-fields:
      heading: Deployment Details
    asyncapi.com/channels:
      heading: AsyncAPI Channels
      rank: 99 # This custom content should come last (just for fun).
      # For larger templates, load them from a file (relative to this
      # config file) instead of embedding them inline.
      templateFile: custom/asyncapi_channels.html
  # Same thing as annotationBasedContent, but for status observations.
  statusBasedContent:
    swcat/plugins-update-time:
      heading: Update Time (from Status)
      open: true
      template: |
        <p>{{ . }}</p>
svg:
  # Show the (programming) language label as a <<stereotype>> on nodes.
  stereotypeLabels:
    - foobar.dev/language
  # Highlight nodes with a certain status in different fill colors.
  nodeColors:
    labels:
      foobar.dev/status:
        deprecated: '#f3c1de'
        critical: '#c7398a'
    types:
      # Color entities (of any kind) with spec.type "external" in a special color. 
      external: '#ffbf79'
  # Include the API provider (component) in labels of API entities.
  showAPIProvider: true
  # Include the parent system in labels of component, resource, and API entities.
  showParentSystem: true
  # Show the API version in consumedApis/providedApis references, if specified
  # and unless an explicit label is present.
  showVersionAsLabel: true
catalog:
  # Create links for entities with certain annotations.
  annotationBasedLinks:
    hexz.me/repo:
      url: |-
        {{ addQueryParams (printf "https://code.example.com/projects/%s/repos/%s" .Annotation.Value .Metadata.Name)
             (queryParams 
                "branch" "main" 
                "ns" .Metadata.Namespace ) }}
      title: Source code
      icon: code
    hexz.me/logging:
      url: https://example.com/logs/{{ .MultiLink.Value.logName }}/{{ .Metadata.Name }}
      title: Logs
      icon: logs
      multiLinkData: environments
      multiLinks:
        - label: main
          value: 
            logName: main
    hexz.me/asyncapi:
      url: https://example.com/repos/apis/{{.MultiLink.Value}}/{{ .Annotation.Value }}_{{ .Version.Major }}
      title: API Schema ({{ .Version }})
      multiLinks:
        - label: dev
          value: dev
        - label: prod
          value: prod
  # Create links for all entities matching a filter.
  automaticLinks:
      - filter: |
          kind=component AND (system=flights-search OR system=flights-tickets)
        url: https://grafana.example.com/dashboards/prod/{{ first (.IAnnotation "hexz.me/monitoring") .Metadata.Name }}
        title: Monitoring
  validation:
    api:
      type:
        matches: 
          - "http(s)?/.*"
          - "grpc(/.*)?"
          - "rest(/.*)?"
          - "kafka(/.*)?"
          - "oidc"
      lifecycle: 
        values: ["experimental", "production", "deprecated"]
    resource:
      type:
        values: ["database", "analytics-database", "cache", "kafka"]
    component:
      type:
        values: ["service", "job", "support", "external"]
      lifecycle: 
        values: ["development", "production", "deprecated", "external"]
    system:
      type:
        matches:
          - ".*"  # just for fun
