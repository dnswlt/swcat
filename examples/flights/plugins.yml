plugins:

  timestampStatus:
    kind: TimestampPlugin
    trigger: |-
      kind:Domain
    spec:
      target: observation
  
  asyncApiImporter:
    # Showcases the importer plugin for 3.0.0 AsyncAPI specs.
    kind: AsyncAPIImporterPlugin
    trigger: |-
      kind:API AND type~'^kafka/'
    inhibit: |-
      annotation='swcat/visibility=internal'
    spec:
      fetcher:
        packaging: jar
        classifier: asyncapi
        replaceProperties: true
      file: META-INF/asyncapi.yaml

  javaHello:
    kind: GRPCPlugin
    trigger: |-
      kind:Component
    spec:
      address: ${SWCAT_GRPC_PLUGIN_ADDR:-localhost:50051}
      config:
        pluginName: hello
        name: Jens
