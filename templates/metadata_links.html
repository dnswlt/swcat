{{ if .Metadata.Links }}
<div class="border rounded-lg">
    <h3 class="font-semibold bg-gray-100 px-3 py-1 rounded-t-lg">Links</h3>
    <div class="p-3">
        <ul class="space-y-1">
            {{ range .Metadata.Links }}
            <li class="flex items-center gap-1.5 text-gray-400">
                {{ linkIcon .Icon }}
                <a href="{{ .URL }}" class="text-blue-600 hover:underline" target="_blank">
                    {{ if .Title }}{{ .Title }}{{ else }}{{ .URL }}{{ end }}
                </a>
            </li>
            {{ end }}
        </ul>
    </div>
</div>
{{ end }}
