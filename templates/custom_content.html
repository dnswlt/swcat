<!-- Custom content based on entity annotations / status observations -->
{{ range $i, $cc := . }}
<details class="border rounded-lg" {{if $cc.Open }}open{{end}}>
    <summary class="font-semibold bg-gray-100 px-3 py-1 rounded-t-lg cursor-pointer">{{ $cc.Heading }}</summary>
    {{ if $cc.Code }}
    <div class="max-h-96 overflow-y-auto">
        <textarea id="custom-content-{{$i}}" class="json-viewer">{{ $cc.Code }}</textarea>
    </div>
    {{ else }}
    <div class="custom-content">{{ $cc.HTML }}</div>
    {{ end }}
    {{ if $cc.Meta }}
    <dl class="px-3 py-1.5 border-t flex flex-wrap gap-x-5 gap-y-0.5 text-xs text-gray-500">
        {{ range $cc.Meta }}
        <div class="flex gap-1">
            <dt>{{ .Name }}</dt>
            <dd>{{ .Value }}</dd>
        </div>
        {{ end }}
    </dl>
    {{ end }}
</details>
{{ end }}
