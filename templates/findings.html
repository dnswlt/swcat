{{if .}}
<details class="border rounded-lg mt-6 text-sm group" open>
    <summary class="font-semibold bg-gray-100 px-3 py-1 border-b rounded-t-lg text-gray-700 cursor-pointer hover:bg-gray-100 transition-colors list-none flex justify-between items-center">
        <span>Lint Findings ({{ len . }})</span>
        <span class="text-xs text-gray-400 group-open:rotate-180 transition-transform">▼</span>
    </summary>
    <div class="p-3 space-y-2">
        {{range .}}
        <div class='p-3 rounded-md {{if eq .Severity "error"}}bg-red-50 text-red-700 border border-red-200{{else if eq .Severity "warn"}}bg-yellow-50 text-yellow-700 border border-yellow-200{{else}}bg-blue-50 text-blue-700 border border-blue-200{{end}}'>
            <div class="flex">
                <div class="flex-shrink-0">
                    {{if eq .Severity "error"}}
                    <svg class="h-5 w-5 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    {{else if eq .Severity "warn"}}
                    <svg class="h-5 w-5 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    {{else}}
                    <svg class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    {{end}}
                </div>
                <div class="ml-3">
                    <p class="text-sm font-medium">
                        <span class="font-bold">[{{.RuleName}}]</span> {{.Message}}
                    </p>
                </div>
            </div>
        </div>
        {{end}}
    </div>
</details>
{{end}}
