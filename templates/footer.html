<footer class="bg-white shadow mt-4 max-w-screen-lg mx-auto rounded-xl">
    <div id="footer-error-messages" class="px-4"></div>
    <div class="px-4 py-3 flex justify-between items-center text-sm text-gray-500">
        <div class="flex items-center space-x-2">
            <span>swcat {{ .Version }}</span>
            {{ if .HelpLink }}
            <span class="text-gray-300">|</span>
            <a href="{{ .HelpLink.URL }}" target="_blank" class="hover:text-blue-600 transition-colors">
                {{ .HelpLink.Title }}
            </a>
            {{ end }}
        </div>
        <div class="flex items-center space-x-2">
            {{ if .RefOptions }}
            <select name="ref"
                onchange="window.location.href = this.options[this.selectedIndex].dataset.url;"
                class="block rounded-md border-gray-300 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 text-sm p-1">
                {{ range .RefOptions }}
                <option value="{{ .Ref }}" data-url="{{ .URL }}" {{if .Selected}}selected{{end}}>{{ .Ref }}</option>
                {{ end }}
            </select>
            {{ end }}
            {{ if .CanStartSession }}
            <button hx-post='{{ uiURL "sessions" }}' hx-swap="none"
                title="Start edit session"
                class="hover:text-blue-600 transition-colors cursor-pointer font-medium flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pencil">
                    <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
                    <path d="m15 5 4 4"/>
                </svg>
            </button>
            {{ end }}
            {{ if .IsSession }}
            <button hx-post='{{ uiURL "sessions/push" }}' hx-swap="innerHTML" hx-target="#footer-error-messages" hx-confirm="Upload changes to the remote Git server?"
                title="Upload session"
                class="hover:text-green-600 transition-colors cursor-pointer font-medium flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-upload">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" x2="12" y1="3" y2="15"/>
                </svg>
            </button>
            <button hx-delete='{{ uiURL "sessions" }}' hx-swap="none" hx-confirm="Discard all changes in this session?"
                title="Discard edit session"
                class="hover:text-red-600 transition-colors cursor-pointer font-medium flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash-2">
                    <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>
                </svg>
            </button>
            {{ end }}
            <!-- Server will return a HX-Refresh header on success, which triggers a page reload -->
            <button hx-post="/catalog/reload" hx-swap="innerHTML" hx-target="#footer-error-messages"
                title="Reload the catalog"
                class="hover:text-blue-600 transition-colors cursor-pointer font-medium flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-rotate-cw">
                    <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
                    <path d="M21 3v5h-5" />
                </svg>
            </button>
        </div>
    </div>
</footer>
