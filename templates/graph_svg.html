<div id="graph-container" class="space-y-4" hx-swap-oob="true">
    {{ if .SVG }}
    <!-- Selected Entities + Graph options -->
    <div class="space-y-1">
        {{ if .SelectedEntities }}
        <div id="selected-entities" class="flex flex-wrap gap-2">
            {{ range .SelectedEntities }}
            <div class="flex items-center gap-1 px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs">
                <span>{{ .GetQName }}</span>
                <button
                    hx-get="{{ $.GraphURL }}"
                    hx-target="#entities-tbody"
                    hx-swap="innerHTML"
                    hx-push-url="true"
                    data-graph-action="remove-entity"
                    data-entity-ref="{{ .GetRef }}"
                    class="hover:text-blue-900 font-bold ml-1">&times;</button>
            </div>
            {{ end }}
        </div>
        {{ end }}
        <div class="flex items-center gap-4">
            <label class="flex items-center gap-1.5 text-sm text-gray-600 cursor-pointer select-none">
                <input type="checkbox"
                    {{ if .SystemsAsClusters }}checked{{ end }}
                    hx-get="{{ .GraphURL }}"
                    hx-target="#entities-tbody"
                    hx-swap="innerHTML"
                    hx-trigger="change"
                    hx-push-url="true"
                    data-graph-action="toggle-clusters">
                System boundaries
            </label>
            <button type="button"
                popovertarget="connect-popover"
                title="Fully connect: add all entities on any path between two currently selected entities"
                class="inline-flex items-center justify-center p-1 text-gray-600 hover:text-blue-700 hover:bg-blue-100 rounded">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-share-2">
                    <circle cx="18" cy="5" r="3"/>
                    <circle cx="6" cy="12" r="3"/>
                    <circle cx="18" cy="19" r="3"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="11.49"/>
                </svg>
                <span class="sr-only">Fully connect</span>
            </button>
            <div id="connect-popover" popover
                class="ui-popover p-0 bg-white rounded-lg shadow-xl border border-gray-200 text-sm min-w-[200px]">
                <div class="px-3 py-2 border-b border-gray-100 text-xs font-semibold text-gray-500 uppercase tracking-wide">
                    Connect Path Settings
                </div>
                <div class="px-3 py-3 space-y-3">
                    <div class="space-y-1">
                        <label for="max-depth" class="block text-xs font-medium text-gray-700">Max Path Length</label>
                        <input type="number" id="max-depth" name="maxDepth" value="5" min="0" step="1"
                            class="w-full px-2 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500"
                            title="Limit the length of paths to include. 0 means unlimited.">
                        <p class="text-[10px] text-gray-500 italic">0 = unlimited</p>
                    </div>
                    <button type="button"
                        hx-get="{{ .GraphURL }}"
                        data-graph-action="fully-connect"
                        popovertarget="connect-popover" popovertargetaction="hide"
                        class="w-full bg-blue-100 hover:bg-blue-200 text-blue-700 py-1.5 px-3 rounded text-sm font-medium cursor-pointer transition-colors">
                        Expand Graph
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- SVG and its metadata JSON. -->
    <div id="relationships-svg">
        {{ .SVG }}
    </div>
    <script type="application/json" id="relationships-svg-meta">
        {{ .SVGMetadataJSON }}
    </script>
    {{ end }}

</div>
