apiVersion: swcat/v1
kind: Domain
metadata:
  name: test-domain
spec:
  owner: test-group
---
apiVersion: swcat/v1
kind: Group
metadata:
  name: test-group
spec:
  type: team
  profile:
    displayName: Test Group
---
apiVersion: swcat/v1
kind: System
metadata:
  name: lint-test-system
spec:
  owner: test-group
  domain: test-domain
---
apiVersion: swcat/v1
kind: API
metadata:
  name: providerless-api
  description: An API that has no provider.
spec:
  type: https/json
  lifecycle: production
  owner: test-group
  system: lint-test-system
---
apiVersion: swcat/v1
kind: Component
metadata:
  name: docless-component
  description: A component without documentation links.
  links:
    - url: https://example.com/repo
      title: Repository
      type: repo
spec:
  type: service
  lifecycle: production
  owner: test-group
  system: lint-test-system
